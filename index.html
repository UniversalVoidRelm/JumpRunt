<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>JumpRunt</title>
<style>
body{
margin:0;
background:#87CEEB;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:sans-serif;
}

canvas{
background:#aee3ff;
border:3px solid black;
}
</style>
</head>

<body>
<canvas id="game" width="320" height="480"></canvas>

<script>

const canvas = document.getElementById("game")
const ctx = canvas.getContext("2d")

let gravity = 0.5
let jumpPower = -10

let bunny = {
x:160,
y:350,
vx:0,
vy:0,
size:16
}

let platforms = []

function createPlatform(y){
let x = Math.random() * (canvas.width - 80)
platforms.push({
x:x,
y:y,
w:80,
h:10
})
}

for(let i=0;i<10;i++){
createPlatform(480 - i*50)
}

function update(){

bunny.vy += gravity
bunny.y += bunny.vy

platforms.forEach(p=>{

if(
bunny.vy > 0 &&
bunny.x + bunny.size > p.x &&
bunny.x < p.x + p.w &&
bunny.y + bunny.size > p.y &&
bunny.y + bunny.size < p.y + p.h + 10
){
bunny.vy = jumpPower
}

})

if(bunny.y < 200){
let diff = 200 - bunny.y
bunny.y = 200

platforms.forEach(p=>{
p.y += diff
})

}

platforms = platforms.filter(p => p.y < canvas.height)

while(platforms.length < 10){
createPlatform(Math.random()*-50)
}

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

platforms.forEach(p=>{
ctx.fillStyle = "green"
ctx.fillRect(p.x,p.y,p.w,p.h)
})

ctx.fillStyle = "white"
ctx.beginPath()
ctx.arc(bunny.x,bunny.y,bunny.size,0,Math.PI*2)
ctx.fill()

ctx.fillStyle="black"
ctx.fillRect(bunny.x-5,bunny.y-20,4,12)
ctx.fillRect(bunny.x+1,bunny.y-20,4,12)

}

function gameLoop(){
update()
draw()
requestAnimationFrame(gameLoop)
}

gameLoop()

function jumpLeft(){
bunny.vx = -4
bunny.vy = jumpPower
bunny.x += bunny.vx
}

function jumpRight(){
bunny.vx = 4
bunny.vy = jumpPower
bunny.x += bunny.vx
}

document.addEventListener("keydown",e=>{
if(e.key==="ArrowLeft"||e.key==="a"){
jumpLeft()
}
if(e.key==="ArrowRight"||e.key==="d"){
jumpRight()
}
})

canvas.addEventListener("click",e=>{
let rect = canvas.getBoundingClientRect()
let x = e.clientX - rect.left

if(x < canvas.width/2){
jumpLeft()
}else{
jumpRight()
}
})

</script>
</body>
</html>
