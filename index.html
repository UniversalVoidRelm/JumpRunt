<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RunBun Style Code Runner</title>
<style>
body{
  margin:0;
  font-family:monospace;
  background:#0f172a;
  color:white;
  display:flex;
  height:100vh;
}
#editor{
  width:50%;
  height:100%;
  border:none;
  outline:none;
  padding:20px;
  background:#020617;
  color:#e2e8f0;
  font-size:14px;
  resize:none;
}
#right{
  width:50%;
  display:flex;
  flex-direction:column;
}
#run{
  background:#22c55e;
  border:none;
  padding:12px;
  font-size:16px;
  cursor:pointer;
}
#output{
  flex:1;
  background:#020617;
  padding:20px;
  overflow:auto;
  white-space:pre-wrap;
}
</style>
</head>
<body>

<textarea id="editor">
// Write JavaScript here
console.log("Hello World");
</textarea>

<div id="right">
<button id="run">Run</button>
<div id="output"></div>
</div>

<script>
const editor = document.getElementById("editor");
const output = document.getElementById("output");
const run = document.getElementById("run");

run.onclick = () => {
  output.textContent = "";
  const log = console.log;
  console.log = (...args)=>{
    output.textContent += args.join(" ") + "\n";
  };
  try{
    eval(editor.value);
  }catch(err){
    output.textContent += err;
  }
  console.log = log;
};
</script>

</body>
</html>
