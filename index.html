<!DOCTYPE html>
<html>
<head>
<title>JumpRunt</title>
<style>
body{
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#87ceeb;
}

canvas{
border:3px solid black;
background:#aee3ff;
}
</style>
</head>

<body>

<canvas id="game" width="320" height="480"></canvas>

<script>

const canvas = document.getElementById("game")
const ctx = canvas.getContext("2d")

let bunny = {x:160,y:400,vx:0,vy:0,size:15}
let gravity = 0.5
let jump = -9

let platforms = []

function newPlatform(y){
platforms.push({
x:Math.random()*240+20,
y:y,
w:60,
h:10
})
}

for(let i=0;i<10;i++){
newPlatform(480-i*50)
}

function update(){

bunny.vy += gravity
bunny.y += bunny.vy

for(let p of platforms){

if(
bunny.vy>0 &&
bunny.x>p.x &&
bunny.x<p.x+p.w &&
bunny.y+bunny.size>p.y &&
bunny.y+bunny.size<p.y+15
){
bunny.vy=jump
}

}

if(bunny.y<200){

let diff=200-bunny.y
bunny.y=200

for(let p of platforms){
p.y+=diff
}

}

platforms=platforms.filter(p=>p.y<500)

while(platforms.length<10){
newPlatform(Math.random()*-40)
}

}

function draw(){

ctx.clearRect(0,0,320,480)

for(let p of platforms){
ctx.fillStyle="green"
ctx.fillRect(p.x,p.y,p.w,p.h)
}

ctx.fillStyle="white"
ctx.beginPath()
ctx.arc(bunny.x,bunny.y,bunny.size,0,Math.PI*2)
ctx.fill()

}

function loop(){
update()
draw()
requestAnimationFrame(loop)
}

loop()

function left(){
bunny.vx=-4
bunny.vy=jump
bunny.x+=bunny.vx
}

function right(){
bunny.vx=4
bunny.vy=jump
bunny.x+=bunny.vx
}

document.addEventListener("keydown",e=>{
if(e.key==="ArrowLeft"||e.key==="a")left()
if(e.key==="ArrowRight"||e.key==="d")right()
})

canvas.addEventListener("click",e=>{
let r=canvas.getBoundingClientRect()
let x=e.clientX-r.left
if(x<160)left()
else right()
})

</script>

</body>
</html>
