<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>JumpRunt</title>

<style>
body{
margin:0;
background:#111;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:Arial;
}

canvas{
border:4px solid #222;
background:#1a1a1a;
}

#score{
position:absolute;
top:20px;
left:50%;
transform:translateX(-50%);
color:#ffd84a;
font-size:28px;
font-weight:bold;
}

#cps{
position:absolute;
top:20px;
right:20px;
color:white;
font-size:14px;
}
</style>
</head>

<body>

<div id="score">0</div>
<div id="cps">CPS: 0</div>

<canvas id="game" width="260" height="520"></canvas>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

let score=0
let lava=500

let clicks=[]
let cps=0

let bunny={
x:130,
y:420,
size:14
}

let jumping=false
let jumpT=0
let startX,startY,targetX,targetY

let platforms=[]

function createPlatform(y){
let side=Math.random()<0.5?"left":"right"
let x=side==="left"?45:175
platforms.push({x:x,y:y,side:side})
}

for(let i=0;i<8;i++){
createPlatform(420-i*70)
}

function registerClick(){
let now=Date.now()
clicks.push(now)
clicks=clicks.filter(t=>now-t<1000)
cps=clicks.length
document.getElementById("cps").innerText="CPS: "+cps
}

function jump(side){

if(jumping) return

registerClick()

let target=platforms[1]

if(target.side!==side){
bunny.y+=60
return
}

startX=bunny.x
startY=bunny.y

targetX=target.x+20
targetY=target.y-10

jumpT=0
jumping=true

}

function update(){

lava-=0.05+score*0.002

if(jumping){

jumpT+=0.05

let t=jumpT

bunny.x=startX+(targetX-startX)*t
bunny.y=startY+(targetY-startY)*t-Math.sin(t*Math.PI)*60

if(jumpT>=1){

bunny.x=targetX
bunny.y=targetY

score++
document.getElementById("score").innerText=score

platforms.shift()

let top=platforms[platforms.length-1]
createPlatform(top.y-70)

jumping=false

}

}

if(bunny.y<260){

let diff=260-bunny.y
bunny.y=260

platforms.forEach(p=>{
p.y+=diff
})

lava+=diff
}

platforms=platforms.filter(p=>p.y<540)

if(bunny.y>lava){
location.reload()
}

}

function drawWalls(){

ctx.fillStyle="#555"
ctx.fillRect(0,0,30,520)
ctx.fillRect(230,0,30,520)

ctx.strokeStyle="#444"

for(let y=0;y<520;y+=40){

ctx.beginPath()
ctx.moveTo(0,y)
ctx.lineTo(30,y+10)
ctx.stroke()

ctx.beginPath()
ctx.moveTo(230,y)
ctx.lineTo(260,y+10)
ctx.stroke()

}

}

function drawPlatforms(){

platforms.forEach(p=>{

ctx.fillStyle="#8aff5c"
ctx.fillRect(p.x,p.y,40,10)

ctx.fillStyle="#5fdc3b"
ctx.fillRect(p.x,p.y,40,4)

})

}

function drawBunny(){

ctx.fillStyle="orange"

ctx.beginPath()
ctx.arc(bunny.x,bunny.y,bunny.size,0,Math.PI*2)
ctx.fill()

ctx.fillRect(bunny.x-5,bunny.y-20,4,12)
ctx.fillRect(bunny.x+1,bunny.y-20,4,12)

}

function drawLava(){

ctx.fillStyle="red"
ctx.fillRect(0,lava,260,520)

ctx.fillStyle="orange"
ctx.fillRect(0,lava+10,260,20)

}

function draw(){

ctx.clearRect(0,0,260,520)

drawWalls()
drawPlatforms()
drawBunny()
drawLava()

}

function loop(){
update()
draw()
requestAnimationFrame(loop)
}

loop()

canvas.addEventListener("click",e=>{

let rect=canvas.getBoundingClientRect()
let x=e.clientX-rect.left

if(x<130) jump("left")
else jump("right")

})

document.addEventListener("keydown",e=>{

if(e.key==="ArrowLeft"||e.key==="a") jump("left")
if(e.key==="ArrowRight"||e.key==="d") jump("right")

})

</script>

</body>
</html>
